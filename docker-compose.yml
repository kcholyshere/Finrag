services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  app:
    build: .
    ports:
      - "8503:8501"
    env_file: .env
    environment:
      QDRANT_HOST: qdrant
      GOOGLE_APPLICATION_CREDENTIALS: /gcp/adc.json
    volumes:
      - ${HOME}/.config/gcloud/application_default_credentials.json:/gcp/adc.json:ro
      - ./models/faiss:/app/models/faiss:ro
    depends_on:
      - qdrant

volumes:
  qdrant_storage:
